<svg width="1440" height="1040" viewBox="0 0 1440 1040"
  xmlns="http://www.w3.org/2000/svg" font-family="'Arial Unicode MS','DejaVu Sans','Segoe UI',Helvetica,Arial,sans-serif">

  <defs>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7A7A7A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="aA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#B0B0B0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="aO" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BB8833" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="aGr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1440" height="1040" fill="#FFFFFF"/>

  <!-- ═══ TITLE ═══ -->
  <text x="720" y="50" text-anchor="middle" font-size="27" font-weight="700" fill="#1A1A1A">Consensus Simulator — Architecture</text>
  <text x="720" y="78" text-anchor="middle" font-size="15" fill="#808080">Distributed consensus protocol benchmarking framework</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="60" y="102" width="1320" height="46" rx="8" fill="#FaFaFa" stroke="#E4E4E4" stroke-width="1"/>
  <g font-size="13" fill="#4A4A4A">
    <rect x="96"  y="118" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.3"/><text x="118" y="130">I/O (input / output)</text>
    <rect x="300" y="118" width="14" height="14" rx="3" fill="#F1F1F1" stroke="#6E6E6E" stroke-width="1.3"/><text x="322" y="130">Engine component</text>
    <rect x="512" y="118" width="14" height="14" rx="3" fill="#EAF7EA" stroke="#557755" stroke-width="1.6"/><text x="534" y="130">Swappable protocol</text>
    <rect x="736" y="118" width="14" height="14" rx="3" fill="#F3EEFB" stroke="#7755AA" stroke-width="1.3"/><text x="758" y="130">Reduce / normalise</text>
    <rect x="948" y="118" width="14" height="14" rx="3" fill="#FaEEDA" stroke="#BB8833" stroke-width="1.3"/><text x="970" y="130">Aggregate</text>
    <rect x="1120" y="118" width="14" height="14" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.3"/><text x="1142" y="130">Final output</text>
  </g>

  <!-- ═══════════════════════════════════════════
       ZONE CONTAINERS
  ═══════════════════════════════════════════ -->
  <!-- Zone 1: Input -->
  <rect x="60" y="176" width="600" height="128" rx="12" fill="#FCFCFF" stroke="#C9D6E8" stroke-dasharray="7 5" stroke-width="1.3"/>
  <text x="82" y="200" font-size="12" fill="#7A8CA8" font-weight="600" letter-spacing="0.5">① INPUT — one run configuration</text>

  <!-- Zone 2: Engine -->
  <rect x="60" y="330" width="820" height="470" rx="12" fill="#FCFCFC" stroke="#D2D2D2" stroke-dasharray="7 5" stroke-width="1.3"/>
  <text x="82" y="354" font-size="12" fill="#8A8A8A" font-weight="600" letter-spacing="0.5">② SIMULATION ENGINE — executes once per seed</text>

  <!-- Zone 3: Output -->
  <rect x="940" y="176" width="440" height="624" rx="12" fill="#FDFCFE" stroke="#D8CDE6" stroke-dasharray="7 5" stroke-width="1.3"/>
  <text x="962" y="200" font-size="12" fill="#9280AE" font-weight="600" letter-spacing="0.5">③ OUTPUT PIPELINE</text>

  <!-- ═══ ① ONE RUN CONFIG ═══ -->
  <rect x="96" y="216" width="410" height="72" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.6"/>
  <text x="301" y="244" text-anchor="middle" font-size="17" font-weight="700" fill="#0C447C">One run config</text>
  <text x="301" y="268" text-anchor="middle" font-size="12.5" fill="#2C6BAA">protocol · n validators · seed · network timeline · adversary · workload</text>
  <!-- N seeds badge -->
  <rect x="530" y="234" width="106" height="36" rx="18" fill="#FaEEDA" stroke="#BB8833" stroke-width="1.4"/>
  <text x="583" y="257" text-anchor="middle" font-size="14" font-weight="700" fill="#7A5410">× N seeds</text>

  <!-- Arrow: config → scheduler -->
  <line x1="301" y1="288" x2="301" y2="374" stroke="#185FA5" stroke-width="1.8" marker-end="url(#aB)"/>

  <!-- ═══ ② SCHEDULER ═══ -->
  <rect x="121" y="374" width="360" height="80" rx="10" fill="#F1F1F1" stroke="#6E6E6E" stroke-width="1.4"/>
  <text x="301" y="404" text-anchor="middle" font-size="17" font-weight="700" fill="#2C2C2A">Scheduler</text>
  <text x="301" y="426" text-anchor="middle" font-size="12.5" fill="#5A5A58">virtual clock · deterministic event delivery</text>
  <text x="301" y="444" text-anchor="middle" font-size="11.5" fill="#9A9A98" font-style="italic">same seed → identical replay</text>

  <!-- Scheduler ↔ Protocol -->
  <line x1="285" y1="454" x2="285" y2="522" stroke="#7A7A7A" stroke-width="1.7" marker-end="url(#aG)"/>
  <line x1="317" y1="522" x2="317" y2="454" stroke="#B0B0B0" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#aA)"/>
  <text x="352" y="492" font-size="11.5" fill="#9A9A98" font-style="italic">events / ticks</text>

  <!-- ═══ ② PROTOCOL LOGIC (swappable) ═══ -->
  <rect x="101" y="522" width="400" height="92" rx="10" fill="#EAF7EA" stroke="#557755" stroke-width="2.2"/>
  <text x="301" y="552" text-anchor="middle" font-size="17" font-weight="700" fill="#085041">Protocol logic</text>
  <text x="301" y="576" text-anchor="middle" font-size="13.5" fill="#2A7A5A">PBFT · Casper FFG · Snowman</text>
  <text x="301" y="597" text-anchor="middle" font-size="12.5" fill="#3AA57A" font-style="italic">← the only swappable part →</text>
  <!-- plug-in bracket -->
  <path d="M505 540 Q527 540 527 568 Q527 596 505 596" fill="none" stroke="#557755" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#aG)"/>
  <text x="534" y="572" font-size="11.5" fill="#557755" font-style="italic">plug-in</text>

  <!-- Protocol → NET / ADV / LOG -->
  <line x1="200" y1="614" x2="176" y2="672" stroke="#7A7A7A" stroke-width="1.7" marker-end="url(#aG)"/>
  <line x1="360" y1="614" x2="405" y2="672" stroke="#7A7A7A" stroke-width="1.7" marker-end="url(#aG)"/>
  <line x1="440" y1="614" x2="650" y2="672" stroke="#7A7A7A" stroke-width="1.7" marker-end="url(#aG)"/>

  <!-- ═══ NETWORK ═══ -->
  <rect x="96" y="672" width="220" height="108" rx="10" fill="#F1F1F1" stroke="#6E6E6E" stroke-width="1.4"/>
  <text x="206" y="702" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Network</text>
  <text x="206" y="723" text-anchor="middle" font-size="12" fill="#5A5A58">delay · loss · partition</text>
  <text x="206" y="742" text-anchor="middle" font-size="11" fill="#9A9A98" font-style="italic">phase-varying · timing only</text>
  <text x="206" y="760" text-anchor="middle" font-size="11" fill="#9A9A98" font-style="italic">models real-world conditions</text>

  <!-- ═══ ADVERSARY ═══ -->
  <rect x="340" y="672" width="230" height="108" rx="10" fill="#F1F1F1" stroke="#6E6E6E" stroke-width="1.4"/>
  <text x="455" y="702" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Adversary</text>
  <text x="455" y="723" text-anchor="middle" font-size="12" fill="#5A5A58">per-node interceptor</text>
  <text x="455" y="742" text-anchor="middle" font-size="12" fill="#5A5A58">delay · silent drop</text>
  <text x="455" y="761" text-anchor="middle" font-size="12" fill="#5A5A58">equivocation (BFT attack)</text>

  <!-- ═══ LOGGER ═══ -->
  <rect x="594" y="672" width="228" height="108" rx="10" fill="#F1F1F1" stroke="#6E6E6E" stroke-width="1.4"/>
  <text x="708" y="702" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2A">Logger</text>
  <text x="708" y="723" text-anchor="middle" font-size="12" fill="#5A5A58">records decisions</text>
  <text x="708" y="742" text-anchor="middle" font-size="12" fill="#5A5A58">halts · messages</text>
  <text x="708" y="761" text-anchor="middle" font-size="11" fill="#9A9A98" font-style="italic">raw data source</text>

  <!-- ═══ BRIDGE: Logger → Normalise ═══ -->
  <path d="M822 726 L890 726 L890 300 L986 300" fill="none" stroke="#7A7A7A" stroke-width="1.7" marker-end="url(#aG)" stroke-dasharray="7 4"/>
  <rect x="850" y="498" width="80" height="24" rx="6" fill="#FFFFFF"/>
  <text x="890" y="515" text-anchor="middle" font-size="11.5" fill="#8A8A8A" font-style="italic">raw log</text>

  <!-- ═══ ③ NORMALISE ═══ -->
  <rect x="994" y="256" width="336" height="88" rx="10" fill="#F3EEFB" stroke="#7755AA" stroke-width="1.6"/>
  <text x="1162" y="286" text-anchor="middle" font-size="17" font-weight="700" fill="#3C3489">Normalise</text>
  <text x="1162" y="308" text-anchor="middle" font-size="12.5" fill="#5A4FB0">3 decision types → 1 shared scale</text>
  <text x="1162" y="328" text-anchor="middle" font-size="11.5" fill="#8A7FC8" font-style="italic">enables fair cross-protocol comparison</text>

  <line x1="1160" y1="344" x2="1160" y2="420" stroke="#7A7A7A" stroke-width="1.7" marker-end="url(#aG)"/>

  <!-- ═══ ③ ONE RESULT ROW ═══ -->
  <rect x="990" y="420" width="340" height="140" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.6"/>
  <text x="1160" y="450" text-anchor="middle" font-size="17" font-weight="700" fill="#0C447C">One result row</text>
  <line x1="1030" y1="462" x2="1290" y2="462" stroke="#C4DAF0" stroke-width="1"/>
  <text x="1160" y="484" text-anchor="middle" font-size="13" fill="#2C6BAA">latency</text>
  <text x="1160" y="506" text-anchor="middle" font-size="13" fill="#2C6BAA">throughput</text>
  <text x="1160" y="528" text-anchor="middle" font-size="13" fill="#2C6BAA">message overhead</text>
  <text x="1160" y="550" text-anchor="middle" font-size="13" fill="#2C6BAA">reliability</text>

  <line x1="1160" y1="560" x2="1160" y2="628" stroke="#7A7A7A" stroke-width="1.7" marker-end="url(#aG)"/>

  <!-- ═══ ③ AGGREGATE ═══ -->
  <rect x="1020" y="628" width="280" height="92" rx="10" fill="#FaEEDA" stroke="#BB8833" stroke-width="1.6"/>
  <text x="1160" y="658" text-anchor="middle" font-size="17" font-weight="700" fill="#7A5410">Aggregate</text>
  <text x="1160" y="682" text-anchor="middle" font-size="13" fill="#8A6018">N seeds → aggregated mean row</text>
  <text x="1160" y="702" text-anchor="middle" font-size="11.5" fill="#A87828" font-style="italic">removes randomness bias</text>

  <!-- Loop back: Aggregate → config -->
  <path d="M1300 674 Q1362 674 1362 440 Q1362 232 640 232 Q590 232 555 240"
        fill="none" stroke="#BB8833" stroke-width="1.6" stroke-dasharray="8 5" marker-end="url(#aO)"/>
  <rect x="1336" y="486" width="54" height="24" rx="6" fill="#FFFFFF"/>
  <text x="1362" y="503" text-anchor="middle" font-size="11.5" fill="#A87828" font-weight="600" transform="rotate(-90,1362,503)">repeat</text>

  <!-- Aggregate → Final table -->
  <path d="M1160 720 L1160 850 Q1160 890 720 890 L720 916"
        fill="none" stroke="#3B6D11" stroke-width="1.8" marker-end="url(#aGr)"/>

  <!-- ═══ FINAL COMPARISON TABLE ═══ -->
  <rect x="220" y="916" width="1000" height="96" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="2"/>
  <text x="720" y="950" text-anchor="middle" font-size="18" font-weight="700" fill="#173404">Final comparison table</text>
  <text x="720" y="976" text-anchor="middle" font-size="13.5" fill="#3B6D11">protocol × scenario  →  latency · throughput · message overhead · reliability</text>
  <text x="720" y="997" text-anchor="middle" font-size="12" fill="#4A7A18" font-style="italic">each metric reported as the mean across N seeds</text>

</svg>
